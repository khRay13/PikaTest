<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮卡丘的悄悄話 ⚡️</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <style>
        /* ⏳ === 載入畫面專屬樣式 === ⏳ */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #2c3e50; /* 深色背景質感覺好，不刺眼 */
            z-index: 999999; /* 絕對要在畫面的最最最上層 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease; /* 淡出動畫 */
        }

        /* 旋轉的皮卡丘色光圈 */
        .spinner {
            width: 60px;
            height: 60px;
            border: 8px solid rgba(255, 255, 255, 0.2);
            border-top: 8px solid #ffcc00; /* 皮卡丘黃 */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4); /* 發光效果 */
        }

        /* 呼吸燈文字 */
        .loading-text {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        /* ⏳ ========================= ⏳ */

        body {
            margin: 0;
            background-image: url('src/background.v2.jpg');
            background-size: cover;      /* 讓圖片無死角填滿整個螢幕 */
            background-position: center; /* 讓圖片置中，主角不被卡掉 */
            background-repeat: no-repeat;/* 防止圖片太小像磁磚一樣狂拼貼 */
            background-color: #f0f8ff; /* 換個深色背景，讓字幕更明顯 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Microsoft JhengHei', sans-serif;
            overflow: hidden; /* 防止滾動條 */
        }

        model-viewer {
            width: 100%;
            height: 60vh; /* 稍微縮小模型高度，留空間給字幕 */
            transform: translateY(3vh); /* 把皮卡丘往下推 3% 的螢幕高度 */
            display: none;
            position: relative; /* 讓裡面的花朵可以使用百分比定位 */
        }

        #startBtn {
            padding: 20px 40px;
            font-size: 24px;
            background-color: #ffcc00;
            color: #333;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        #startBtn:active { transform: scale(0.95); }

        .hint {
            margin-top: 20px;
            color: #ffffff;
            font-size: 14px;
            background-color: rgba(10, 10, 10, 0.5);
            border-radius: 6px;
            text-align: center;
            vertical-align: middle;
            padding: 5px 10px; /* 稍微加點內距讓底色更好看 */
        }

        #playSoundBtn {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            border: none;
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            display: none;
            z-index: 10;
        }

        /* 💬 字幕框的魔法設定 */
        #subtitleBox {
            display: none;
            width: 80%;
            max-width: 600px;
            min-height: 20px;
            margin-top: 30px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6); /* 半透明黑底 */
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border-radius: 12px;
            text-shadow: 1px 1px 3px #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            /* 加入淡入淡出動畫感 */
            transition: opacity 0.3s ease;
        }

        /* 💖 雙擊飄浮愛心的專屬樣式 */
        .floating-heart {
            position: fixed; /* 絕對定位於螢幕 */
            font-size: 40px; /* 愛心的大小 */
            pointer-events: none; /* 讓愛心不會擋住你點擊背後的模型 */
            z-index: 9999; /* 確保它在畫面最上層 */
            user-select: none; /* 防止手機連點時不小心反白到元素 */

            /* 啟動動畫：名稱、時間、速度曲線、播放完畢停留在最後狀態 */
            animation: floatUp 1.2s ease-out forwards;
        }

        /* 向上飄移並淡出的動畫軌跡 */
        @keyframes floatUp {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            20% { transform: translate(-50%, -80%) scale(1.2); } /* 瞬間變大製造彈出感 */
            100% { transform: translate(-50%, -200px) scale(1); opacity: 0; } /* 往上飄並消失 */
        }

        /* 🌸 === 道具開啟特效的核心 CSS === 🌸 */
        #giftFlower {
            display: none; /* 一開始完全隱藏 */
            position: absolute; /* 相對於 model-viewer 定位 */
            width: 15%; /* 使用螢幕寬度的 15%，確保不論電腦手機大小都不會太怪 */
            max-width: 100px;
            min-width: 50px;

            /* 道具出現位置 (百分比定位) */
            top: 45%; /* 距離 model-viewer 頂部 45% 的位置，大約在皮卡丘胸口高度 */
            left: 20%; /* 距離 model-viewer 左側 20% 的位置，皮卡丘的右側空白處 */
            transform: translate(-50%, -50%); /* 精確置中 */

            opacity: 0; /* 出現前為透明 */
            z-index: 5;

            /* 淡入(0.5秒) + 永久飄浮(3秒無限循環) */
            animation: fadeInFlower 0.5s ease forwards, floatFlower 3s ease-in-out infinite;
            animation-delay: 0s, 0.5s; /* 飄浮在半秒後才開始無限循環 */
        }

        /* 道具開啟時的閃白光 CSS 特效 */
        .white-flash {
            position: absolute;
            width: 15%; /* 與花朵同寬 */
            aspect-ratio: 1; /* 1:1的正方形白光 */
            background-color: #fff;
            border-radius: 50%; /* 變成圓形白光 */
            top: 45%; /* 必須跟花朵的位置完全一樣 */
            left: 20%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 50px 10px #fff; /* 白光發亮特效 */
            opacity: 1;
            z-index: 6; /* 擋在花朵前面 */

            /* 啟動瞬間變大並淡出的白光動畫 */
            animation: flashOn 0.5s ease-out forwards;
        }

        /* 1. 白光閃光動畫：瞬間放大並淡出 */
        @keyframes flashOn {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
        }

        /* 2. 花朵淡入動畫 */
        @keyframes fadeInFlower {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        /* 3. 寶可夢道具飄浮動畫 (上下浮動無限循環) */
        @keyframes floatFlower {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -65%); } /* 向上浮動 */
        }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="spinner"></div>
        <div class="loading-text">Loading... ⚡️</div>
    </div>

    <button id="startBtn">Click Me ⚡️</button>
    <p class="hint">（請確認手機未靜音）</p>

    <model-viewer
        id="pikaModel"
        src="pikachu/source/pikachu2.glb"
        camera-controls
        auto-rotate
        autoplay
        scale="0.9 0.9 0.9"
        orientation="0 0 0"
        shadow-intensity="1"
        environment-image="neutral"
        exposure="1">

        <button id="playSoundBtn">🔊 再聽一次</button>

        <img id="giftFlower" src="src/flower.png" alt="Gracidea">

    </model-viewer>

    <div id="subtitleBox"></div>

    <audio id="pikaAudio" src="src/FinalVoice.mp3"></audio>

    <script>
        // ⏳ === 載入畫面消除邏輯 === ⏳
        // window.addEventListener('load') 會耐心等待所有大圖(包含背景)、模型、音檔完全下載完畢
        window.addEventListener('load', () => {
            const loadingScreen = document.getElementById('loadingScreen');
            // 讓它有 0.5 秒的淡出過場，比較高級
            loadingScreen.style.opacity = '0';
            // 淡出結束後徹底移除，才不會擋住下方的點擊按鈕
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 500);
        });

        const btn = document.getElementById('startBtn');
        const model = document.getElementById('pikaModel');
        const audio = document.getElementById('pikaAudio');
        const hint = document.querySelector('.hint');
        const playSoundBtn = document.getElementById('playSoundBtn');
        const subtitleBox = document.getElementById('subtitleBox');

        // 🌸 綁定花朵元素
        const flower = document.getElementById('giftFlower');

        // 🌸 【關鍵設定】道具出現的時間軸(秒)
        // 根據你的字幕，"我手上的花是 Gracidea" 在 43.0 秒出現
        const flowerShowTime = 43.0;

        // 控制道具開啟動畫的旗標，確保每次播放只閃一次光
        let flowerAnimationTriggered = false;

        // 🎬 你的字幕時間軸清單
        const subtitles = [
            { time: 0.0, text: "（皮卡皮卡！⚡️）" },
            { time: 1.5, text: "我是皮卡丘，Ray 想要請我跟你說一些話。" },
            { time: 5.0, text: "他說這段時間跟你相處以來，" },
            { time: 7.5, text: "看到你散發的許多吸引人的特質，" },
            { time: 10.5, text: "但他沒有跟我細說有哪些，" },
            { time: 12.8, text: "我只感覺得出來他很喜歡，" },
            { time: 15.5, text: "是認真的，真誠的，或許你可以親自問問他。" },
            { time: 20.7, text: "他還說，不知道從什麼時候開始，都會第一個想到你，" },
            { time: 24.2, text: "想看你開心，想跟你去很多地方，" },
            { time: 27.5, text: "想一起體驗很多事，想與你分享生活，" },
            { time: 31.0, text: "想要問問你有沒有機會考慮，" },
            { time: 33.0, text: "可以和他往比朋友更緊密的關係發展，" },
            { time: 37.0, text: "但他是俗辣不敢親自說，" },
            { time: 39.5, text: "所以請我，皮卡丘幫他轉達想法。" },
            { time: 43.0, text: "我手上的花是 Gracidea，有感恩之意，" },
            { time: 47.0, text: "他說想謝謝你的出現，" },
            { time: 48.5, text: "謝謝好運氣讓他遇到了你，" },
            { time: 50.5, text: "謝謝你願意不厭其煩地和他出去走走，" },
            { time: 54.0, text: "謝謝你願意閱讀、聆聽到這裡。" },
            { time: 57.0, text: "（皮卡丘！⚡️）" },
            { time: 57.7, text: "" } // 最後放個空的，讓聲音播完後字幕消失
        ];

        // 啟動按鈕
        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            hint.style.display = 'none';

            model.style.display = 'block';
            playSoundBtn.style.display = 'block';
            subtitleBox.style.display = 'block';

            model.animationName = 'Idle';

            // 第一次點擊自動播放
            playAudioWithSubtitles();
        });

        // 點擊右上角重播
        playSoundBtn.addEventListener('click', () => {
            playAudioWithSubtitles();
        });

        function playAudioWithSubtitles() {
            audio.currentTime = 0;
            subtitleBox.innerText = ""; // 清空舊字幕

            // 🌸 重置道具開關與狀態 (讓重播時道具可以再次華麗登場)
            flowerAnimationTriggered = false;
            flower.style.display = 'none';
            flower.style.opacity = 0;

            // 如果之前有白光殘留，先清除乾淨
            const oldFlash = document.querySelector('.white-flash');
            if(oldFlash) oldFlash.remove();

            audio.play();
        }

        // ⏱️ 監聽音檔播放時間，自動切換字幕 & 觸發道具
        audio.addEventListener('timeupdate', () => {
            const currentTime = audio.currentTime;

            // 🌸 === [核心功能] 道具開啟特效 === 🌸
            // 當播放時間到達 43.0 秒，且還沒觸發過特效時執行
            if (currentTime >= flowerShowTime && !flowerAnimationTriggered) {
                trigger_item_open_effect();
                flowerAnimationTriggered = true; // 鎖死開關
            }

            // 找出當前時間對應的最後一筆字幕
            let currentText = "";
            for (let i = 0; i < subtitles.length; i++) {
                if (currentTime >= subtitles[i].time) {
                    currentText = subtitles[i].text;
                }
            }

            // 更新字幕畫面
            subtitleBox.innerText = currentText;

            // 如果字幕是空的，隱藏框框讓畫面更乾淨
            if(currentText === "") {
                subtitleBox.style.opacity = 0;
            } else {
                subtitleBox.style.opacity = 1;
            }
        });

        // 🌸 === 【核心 JS 函數】道具開啟特效流程 === 🌸
        function trigger_item_open_effect() {
            // 1. 產生一個白光 CSS 元素
            const flash = document.createElement('div');
            flash.classList.add('white-flash');
            // 將白光加入到 model-viewer 畫布內部
            model.appendChild(flash);

            // 2. 顯示花朵（透明度會由 CSS animation 完美接手處理）
            flower.style.display = 'block';

            // 3. 0.5 秒後 (配合白光閃光的 CSS 時間)，將白光元素從程式碼中刪除，保持效能
            setTimeout(() => {
                flash.remove();
            }, 500);
        }

        // 💖 雙擊愛心噴發系統
        let lastTapTime = 0; // 記錄上一次點擊的時間

        // 監聽整個視窗的點擊/觸控事件
        window.addEventListener('pointerdown', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;

            // 如果兩次點擊時間間隔小於 300 毫秒 (0.3秒)，判定為雙擊
            if (tapLength > 0 && tapLength < 300) {
                // 取得點擊座標
                const x = e.clientX;
                const y = e.clientY;

                // 呼叫製造愛心的函數
                spawnHeart(x, y);
            }
            lastTapTime = currentTime;
        });

        function spawnHeart(x, y) {
            // 建立一個新的 div 元素
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');

            // 你可以放多種不同的 Emoji 讓它隨機出現，增加驚喜感！
            const emojis = ['❤️', '💖', '✨', '💕'];
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            heart.innerText = randomEmoji;

            // 將愛心放到手指點擊的位置
            heart.style.left = `${x}px`;
            heart.style.top = `${y}px`;

            // 隨機左右稍微傾斜，讓飄浮感更自然
            const randomRotation = (Math.random() - 0.5) * 40; // -20度 到 +20度
            heart.style.transform = `rotate(${randomRotation}deg)`;

            // 加進畫面中
            document.body.appendChild(heart);

            // 1.2 秒後 (配合 CSS 動畫時間) 將愛心從程式碼中刪除，避免畫面變卡
            setTimeout(() => {
                heart.remove();
            }, 1200);
        }
    </script>

</body>
</html>
